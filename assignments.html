# 🎯 לוח מטלות ופרויקטים

כאן מרוכזות המטלות הפעילות שלך ופרויקט הגמר מתוך אתר המכללה. המטלות מפורקות לצעדים כדי להקל על הביצוע.

---

## מטלה פעילה: תרגול DDL באמצעות פייתון
<span class="badge active">מטלת בית</span> <span style="font-size: 0.9rem; color: var(--text-sec);">מקור: Practice_DDL_mysql_connector.pdf</span>

תרגול זה נועד לבדוק את יכולתך ליצור טבלאות במסד הנתונים ישירות דרך קוד פייתון.
במקום לפתוח מסוף SQL ולהקליד פקודות, אתה שולח אותן כטקסט מתוך סקריפט ה-Python שלך.

> **דרישות המטלה:**
> 1. לפתוח חיבור תקין ל-MySQL.
> 2. לכתוב מחלקה/פונקציה המייצרת טבלת משתמשים (`users`) אם היא לא קיימת.
> 3. הטבלה צריכה להכיל: `id` (מפתח ראשי ומזהה אוטומטי), `first_name`, `last_name`, ו-`email` (ייחודי).
> 4. לכתוב פקודת `DROP TABLE` למקרה ונרצה לאפס את המסד (אופציונלי אך מומלץ).

**איך מתחילים?**
השתמש במה שלמדנו ב[מרכז הידע של SQL](kb_sql.html). פתח חיבור, פתח Cursor, ושלח לו בתוך פקודת `execute` מחרוזת המכילה את פקודת ה-`CREATE TABLE`.

---

## פרויקט סיכום שלב מבואות: Item Manager API (Library)
<span class="badge project">פרויקט להגשה</span> <span style="font-size: 0.9rem; color: var(--text-sec);">תאריך יעד: 15/06/2026</span>

זהו הפרויקט המסכם הרשמי של שלב המבואות באתר המכללה (מופיע לעיתים תחת השם "Library"). המטרה היא לבנות מערכת שלמה לניהול פריטים במלאי (CRUD מלא + חיפוש וסטטיסטיקות).
**הדגש המרכזי בפרויקט זה הוא עבודה נכונה בארכיטקטורת 3 שכבות!**

> **דרישות הארכיטקטורה ועץ התיקיות:**
> הפרויקט חייב להיות מחולק ל-3 שכבות מובהקות (ראוטר -> סרוויס -> ריפוזיטורי). 
> 
> ```text
> project/
> ├── main.py             # הראוטר הראשי והגדרת ה-FastAPI
> ├── config.py           # הגדרות כלליות
> ├── db.py               # פונקציית התחברות למסד הנתונים
> ├── models/
> │   └── item_model.py   # הגדרות Pydantic
> ├── repositories/
> │   └── item_repository.py # שכבת ה-DAL (SQL בלבד!)
> ├── services/
> │   └── item_service.py # שכבת הלוגיקה (בדיקות וולידציות)
> ├── routers/
> │   └── item_router.py  # ניתוב בקשות HTTP
> └── utils/
>     └── logger.py       # הגדרת ה-Logger
> ```

**איך מתחילים?**
1. היכנס ל[מפת הדרכים המלאה: בניית פרויקט מאפס](roadmap.html) כדי ללמוד על התיאוריה שמאחורי 3 השכבות.
2. פתח את **רשימת המעקב והאפיון של הפרויקט** (Project Spec Checklist) כדי לראות בדיוק אילו שדות נדרשים במסד הנתונים ואילו בקשות HTTP צריך לכתוב.
