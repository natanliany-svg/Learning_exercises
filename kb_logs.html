# 📝 מדריך לימוד: לוגים (Logging)

הקופסה השחורה של המערכת שלך! תיעוד לוגים נכון הוא ההבדל בין דיבוג של שעתיים לדיבוג של שתי דקות.

## 1. הגדרות (Core Concepts)

* **לוגר (Logger):** הרכיב שאליו מעבירים את ההודעה. נהוג ליצור לוגר לכל קובץ.
* **הנדלר (Handler):** קובע לאן הלוג יישלח בפועל – למסך הקונסולה (\`StreamHandler\`) או לקובץ כדי להישמר לתמיד (\`FileHandler\`).
* **פורמטר (Formatter):** מגדיר את מבנה השורה. למשל: תאריך + רמה + קובץ + ההודעה.
* **רמות לוג (Log Levels):**
  * \`DEBUG\`: חקירה בזמן פיתוח.
  * \`INFO\`: אירועי שגרה שהצליחו (המשתמש התחבר).
  * \`WARNING\`: אזהרה על משהו לא אידיאלי אבל המערכת עובדת (למשל אין במלאי).
  * \`ERROR\`: כשל של פעולה (למשל מסד נתונים לא הגיב).

---

## 2. דוגמאות תחביר

\`\`\`python
import logging

# 1. הגדרות בסיסיות לכל המערכת
logging.basicConfig(
    level=logging.INFO, # המערכת תתעלם מ-DEBUG ותרשום מ-INFO ומעלה
    format='%(asctime)s | %(levelname)s | %(name)s | %(message)s'
)

# 2. יצירת לוגר עבור הקובץ הספציפי הזה
logger = logging.getLogger(__name__)

def process_payment(amount):
    logger.info("Processing payment of amount: %s", amount)
    
    try:
        if amount <= 0:
            logger.warning("Attempted to pay with zero or negative amount")
            return
            
        # ... logic ...
        logger.debug("Payment algorithm executed successfully")
        
    except Exception as e:
        # פקודה חשובה: מתעדת את השגיאה + כל ה-Traceback (מי קרא למי)
        logger.exception("Failed to process payment!")
\`\`\`

---

## 3. כללי זהב (Best Practices)

1. **בלי סיסמאות!** לעולם אל תדפיס ללוג נתונים אישיים רגישים (סיסמאות, כרטיסי אשראי). זה פתח לאסון אבטחה.
2. **רק \`logger.exception\` במקרה של שגיאה:** אם אתה בתוך \`except\`, אל תעשה \`logger.error("Error")\`. עשה \`logger.exception("Error")\` ופייתון יצרף אוטומטית את כל הטקסט האדום של השגיאה ללוג, כך שתוכל לדעת בדיוק באיזו שורה קרתה הקריסה.
3. **Signal vs Noise:** אל תרשום "ok" או "done". רשום לוג בעל משמעות כמו "User ID 5 login successful". יותר מדי לוגים גרועים מקשים על קריאתם.
