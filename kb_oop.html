# 🏗️ מדריך למידה: OOP ופיתוח API

מדריך זה מתמקד בעקרונות תכנות מונחה עצמים (OOP) ב-Python הרלוונטיים במיוחד לבניית APIs ומערכות שכבות.

## 1. הגדרות (Core Concepts)

* **מחלקה (Class):** תבנית (Blueprint) ליצירת אובייקטים המגדירה תכונות (Attributes) ופעולות (Methods).
* **אובייקט (Object / Instance):** מופע ספציפי של המחלקה. (למשל, המחלקה היא התבנית "משתמש", והאובייקט הוא המשתמש הספציפי "נתן").
* **מתודת אתחול (\`__init__\`):** פונקציה (Constructor) המופעלת אוטומטית בעת יצירת אובייקט. לרוב משמשת לקבלת חיבור למסד הנתונים בעת הקמת השירות.
* **ירושה (Inheritance):** מחלקה היורשת תכונות ממחלקה אחרת, למניעת כפילות קוד.
* **מחלקה אבסטרקטית (Abstract Class):** חוזה (Contract) המחייב מחלקות יורשות לממש מתודות מסוימות. לא ניתן לייצר ממנה אובייקטים.

---

## 2. דוגמאות תחביר

### יצירת מחלקה ומתודות

\`\`\`python
class UserService:
    # אתחול המחלקה - מקבלים פנימה את החיבור למסד הנתונים
    def __init__(self, db_connection):
        self.db = db_connection
    
    # פעולה (Method) של המחלקה
    def get_user(self, user_id: int):
        return {"id": user_id, "name": "Natan"}

# יצירת המופע (אובייקט) והעברת ה-DB:
my_service = UserService(db_connection="my_database")
my_service.get_user(1)
\`\`\`

### מחלקה אבסטרקטית

\`\`\`python
from abc import ABC, abstractmethod

# החוזה הראשי
class BaseRepository(ABC):
    @abstractmethod
    def save(self, data):
        pass

# מחלקה יורשת (חייבת לממש את save)
class MySQLRepository(BaseRepository):
    def save(self, data):
        print("Saving to MySQL...")
\`\`\`

---

## 3. כללי זהב ל-API ו-OOP

1. **הזרקת תלויות (Dependency Injection):** אל תיצור את חיבור ה-DB *בתוך* ה-Service! העבר אותו מבחוץ דרך ה-\`__init__\`. כך יהיה קל לבדוק (Test) את הקוד שלך.
2. **הפרדת תחומי אחריות (SoC):** פצל קבצים - \`Router\` נפרד, \`Service\` נפרד ו-\`Repository\` נפרד. כל מחלקה עושה אך ורק את התפקיד שלה.
3. **Pydantic Validation:** אל תשתמש במילונים (\`dict\`) עבור נתונים שעוברים בין ראוטר לסרביס - השתמש במודלים המייצגים את הישויות בצורה בטוחה.

---

## 4. אינטגרציה: Pydantic vs ORM (התמונה הגדולה)

חשוב להבין את ההבדל:
* **Pydantic Models:** מחלקות אלו נועדו לאמת נתונים (Validation) **מול הלקוח** (ב-FastAPI).
* **DB ORM Models / SQL:** אלו מחלקות או פקודות שמדברות אך ורק **מול מסד הנתונים**.
* **תפקיד הסרביס:** ה-Service לוקח את אובייקט ה-Pydantic שהגיע מהראוטר, מוציא ממנו את המידע, וקורא ל-Repository שישמור אותו בעזרת ה-ORM או ה-SQL המקורי.
