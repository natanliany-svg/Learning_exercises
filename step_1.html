# 🏗️ שלב 1: הבסיס - החיבור ל-Database

ברוך הבא לשלב הראשון בבניית ה-API שלך! אנחנו תמיד מתחילים "מלמטה" – מהחיבור לאחסון.
הקובץ שעליו נעבוד נקרא \`db.py\` והוא הקובץ שמחבר את קוד הפייתון שלנו למסד הנתונים (MySQL).

> [!NOTE]
> **הקשר למכללה:** זה בדיוק מה שאתה לומד עכשיו במכללה! הספרייה שבה משתמשים כדי לעשות את החיבור הזה נקראת \`mysql-connector-python\`.

---

## מה בעצם קובץ ה-db.py עושה?

דמיין שמסד הנתונים שלך (MySQL) הוא בניין משרדים סגור, והקוד שלך הוא שליח שרוצה למסור מכתבים.
קובץ ה-\`db.py\` הוא למעשה פונקציה שעושה שני דברים:
1. **מתקשרת לבניין:** יוצרת חיבור מאובטח (Connection) באמצעות כתובת, שם משתמש וסיסמה.
2. **נותנת אישור כניסה (Cursor):** היא מחזירה "סמן" שדרכו הראוטר או ה-Repository יוכלו לשלוח בקשות SQL אמיתיות בעתיד.

## איך זה נראה בקוד (דוגמה מפרויקט טיפול בחיות מחמד)?

הנה דוגמה לאיך נראה קובץ חיבור גנרי שמחבר חנות חיות למסד הנתונים:

\`\`\`python
import mysql.connector

def get_db_connection():
    # פונקציה זו יוצרת חיבור טלפוני (Connection) בין פייתון לבין מסד הנתונים
    
    # שלב 1: ניסיון לחייג אל מסד הנתונים בעזרת פרטי ההתחברות (config)
    connection = mysql.connector.connect(
        host="localhost",      # הכתובת (איפה יושב מסד הנתונים - במקרה שלנו במחשב המקומי)
        user="root",           # שם המשתמש למסד הנתונים (בדרך כלל root בדוקר מקומי)
        password="secret",     # הסיסמה שהגדרנו כשפתחנו את הדוקר!
        database="pet_db"      # לאיזה מסד נתונים ספציפי אנחנו רוצים להיכנס
    )
    
    # שלב 2: מחזירים את כבל החיבור החוצה, כדי ששאר המערכת תוכל להשתמש בו
    return connection
\`\`\`

## המשימה שלך לפרויקט ה-Item Manager:

עליך ללכת לתיקייה המקומית של הפרויקט שלך (במחשב שלך: \`week_9\\item Manager API\\project\`) ולפתוח את הקובץ \`db.py\`.

1. עליך לייבא את הספרייה \`mysql.connector\` (שים לב שהיא מותקנת אצלך, ואם לא - תצטרך להתקין \`pip install mysql-connector-python\`).
2. עליך לכתוב פונקציה (נקרא לה \`get_db_connection\`).
3. הפונקציה צריכה להתחבר למסד נתונים בשם שמתאים לפרויקט שלך (למשל \`item_manager_db\`).
4. הפונקציה צריכה להחזיר את החיבור שיצרת.

> [!TIP]
> **הערה חשובה למטלת המכללה מחר:** במטלה שיש לך להגיש ב-DDL למחר, עליך להתחבר בדיוק ככה, ליצור אובייקט *Cursor*, ולבצע (\`execute\`) פקודות כמו \`CREATE TABLE\`. ב-API נקי (כמו שלנו) אנחנו נפריד את ה-Cursor לקובץ ה-Repository, אבל החיבור הבסיסי של ה-Connection הוא **זהה**.

כשתסיים לכתוב את קובץ ה-\`db.py\` שלך בפרויקט ה-Item Manager – תעדכן אותי, ונבדוק יחד אם עשית את זה נכון!
        `;
