<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כרטיסיות תרגול (פלאש) - מרכז ידע API 📱</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-sec: #94a3b8; --accent: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Heebo', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem; }
        h1 { color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: var(--text-sec); margin-bottom: 2rem; text-align: center; max-width: 500px; }
        .flashcard-container { width: 100%; max-width: 400px; height: 300px; perspective: 1000px; margin-bottom: 2rem; cursor: pointer; }
        .flashcard { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .card-front { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-top: 4px solid var(--accent); }
        .card-back { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); transform: rotateY(180deg); border-bottom: 4px solid var(--accent); }
        .category { font-size: 0.9rem; color: var(--accent); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .question { font-size: 1.5rem; font-weight: 600; line-height: 1.4; }
        .answer { font-size: 1.2rem; line-height: 1.6; color: #e2e8f0; }
        .controls { display: flex; gap: 1rem; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; background: #334155; color: white; }
        .btn:hover { background: #475569; }
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-primary:hover { background: #059669; }
        .progress { margin-top: 1.5rem; color: var(--text-sec); font-size: 1.1rem; }
        .nav-back { position: absolute; top: 1rem; right: 1rem; color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <a href="index.html" class="nav-back">← חזרה</a>
    <h1>תרגול בזק: מושגי ליבה ⚡</h1>
    <p class="subtitle">לחץ על הכרטיסייה כדי להפוך אותה ולראות את התשובה. השתמש בכפתורים כדי לעבור שאלה.</p>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="flashcard">
            <div class="card-face card-front">
                <div class="category" id="cat">קטגוריה</div>
                <div class="question" id="q">שאלה טוענת...</div>
            </div>
            <div class="card-face card-back">
                <div class="answer" id="a">תשובה טוענת...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="prevCard()">הקודם</button>
        <button class="btn btn-primary" onclick="nextCard()">הבא</button>
    </div>
    
    <div class="progress" id="progress">1 / 10</div>

    <script>
        const cards = [
            { cat: "SQL", q: "מה התפקיד של Cursor?", a: "הסמן ששולח את פקודות ה-SQL ל-DB ורץ על התוצאות שורה אחר שורה." },
            { cat: "FastAPI", q: "מה ההבדל בין Path Parameter ל-Query Parameter?", a: "Path: זיהוי משאב ספציפי כחלק מהכתובת (חובה). Query: סינון ועיצוב שמופיע אחרי '?' (לרוב רשות)." },
            { cat: "SQL", q: "למה חייבים לעשות connection.commit()?", a: "כי בלעדיו, שינויים שעשינו במסד הנתונים (כמו הוספת משתמש) נשמרים בזיכרון זמני ולא נכתבים בפועל." },
            { cat: "OOP", q: "מה זה AbstractMethod?", a: "פונקציה המוגדרת כ'חוזה' ריק בתוך מחלקת אב. מחלקות יורשות חייבות לממש אותה בעצמן." },
            { cat: "FastAPI", q: "מדוע משתמשים ב-Pydantic (BaseModel)?", a: "כדי לאמת (Validation) שהנתונים הנכנסים ויוצאים תקינים ובטיפוס הנכון (טקסט, מספר)." },
            { cat: "Architecture", q: "מה תפקידו של ה-Router (ראוטר)?", a: "פקיד הקבלה: מקבל בקשת HTTP, מוודא לאן היא שייכת ומעביר ל-Service לטיפול." },
            { cat: "Architecture", q: "מהי שכבת ה-Repository?", a: "השכבה היחידה שמורשית לכתוב קוד SQL ישיר ולתקשר עם Database. היא מסתירה את המורכבות משאר המערכת." },
            { cat: "Logging", q: "מה ההבדל בין INFO ל-DEBUG בלוגים?", a: "DEBUG: מידע טכני מפורט לדיבוג. INFO: אירועי שגרה תקינים וחשובים (למשל פעולה הושלמה)." },
            { cat: "Logging", q: "למה חשוב להשתמש ב-logger.exception()?", a: "בתוך בלוק except, פקודה זו מדפיסה אוטומטית גם את ה-Stack Trace השלם של השגיאה." },
            { cat: "Security", q: "למה אסור לשרשר מחרוזות בשאילתת SQL?", a: "כדי למנוע הזרקת SQL (SQL Injection). תמיד משתמשים בפרמטרים מובנים של הסמן (%s)." },
            { cat: "SQL", q: "מה ההבדל בין DDL ל-DML?", a: "DDL: פקודות לבניית טבלאות ומבנה המסד. DML: פקודות לעבודה עם המידע עצמו (שליפה, הוספה)." },
            { cat: "Python", q: "מה משמעות הסימון ** לפני מילון בקריאה לפונקציה?", a: "פריקה (Unpacking) – לוקח את המילון ומעביר את כל המפתחות שלו בתור ארגומנטים נפרדים לפונקציה." },
            { cat: "Python", q: "למה משמש קו תחתון מבודד (_) בפייתון?", a: "למשתנה שאנחנו חייבים להגדיר מבחינה תחבירית, אבל מצהירים שאין לנו כוונה להשתמש בו." },
            { cat: "FastAPI", q: "אילו סטטוסי HTTP קיימים להצלחה ולשגיאה כשהמשאב לא נמצא?", a: "200: הצלחה. 201: משאב נוצר. 404: לא נמצא. 400/422: נתונים שגויים." },
            { cat: "OOP", q: "מה תפקיד הפונקציה __init__?", a: "זו מתודת האתחול של מחלקה (Constructor). מופעלת אוטומטית ברגע שניצור אובייקט חדש מהמחלקה." },
            { cat: "SQL", q: "מה זה Primary Key (מפתח ראשי)?", a: "עמודה בטבלה המזהה כל שורה באופן חד ערכי וייחודי, למשל id של משתמש. לא יכולה להיות ריקה." },
            { cat: "SQL", q: "מה פקודת ה-SQL להכנסת נתונים לטבלה?", a: "INSERT INTO table_name (column1, column2) VALUES (%s, %s)" },
            { cat: "Architecture", q: "מה תפקידה של שכבת ה-Service?", a: "המוח הלוגי. שם קורים החישובים העסקיים. ה-Service מקבל נתונים מראוטר ומדבר עם ה-Repository." },
            { cat: "SQL", q: "מהו Foreign Key (מפתח זר)?", a: "עמודה שמצביעה למפתח ראשי בטבלה אחרת. יוצרת קשר ומוודאת שאי אפשר להפנות לרשומה שלא קיימת." },
            { cat: "FastAPI", q: "מה קורה לפרמטר פונקציה בראוטר שאינו חלק מנתיב ה-URL?", a: "הוא הופך אוטומטית ל-Query Parameter, למשל search_term שיתווסף כ- ?search_term=foo." },
            { cat: "Python", q: "למה נשתמש ב-try/except?", a: "כדי לתפוס שגיאות שיכולות להקריס את השרת, להתמודד איתן באופן מבוקר ולהחזיר למשתמש תשובה נאותה." },
            { cat: "FastAPI", q: "איך FastAPI מציג את כל הראוטים באתר אוטומטית?", a: "דרך Swagger UI שזמין אוטומטית בנתיב /docs של השרת שלנו." },
            { cat: "SQL", q: "איך שולפים את כל התוצאות מ-Cursor לאחר הרצת SELECT?", a: "משתמשים בפקודה cursor.fetchall() שמחזירה רשימה של רשומות." }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('flashcard');
        const qElement = document.getElementById('q');
        const aElement = document.getElementById('a');
        const catElement = document.getElementById('cat');
        const progElement = document.getElementById('progress');

        function loadCard(index) {
            cardElement.classList.remove('flipped');
            setTimeout(() => {
                const card = cards[index];
                catElement.innerText = card.cat;
                qElement.innerText = card.q;
                aElement.innerText = card.a;
                progElement.innerText = (index + 1) + " / " + cards.length;
            }, 150); // wait for flip back animation
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % cards.length;
            loadCard(currentIndex);
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + cards.length) % cards.length;
            loadCard(currentIndex);
        }

        // Initialize
        loadCard(0);
    </script>
</body>
</html>
