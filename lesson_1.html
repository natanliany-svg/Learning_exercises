## 🧱 חלק 1 — מילונים (Dictionaries)

### מה זה מילון?

מילון (dictionary) הוא מבנה נתונים שמחזיק **זוגות של מפתח וערך** (key-value pairs).  
תחשוב על זה כמו אוצר מילים — לכל מילה (מפתח/key) יש הגדרה (ערך/value).

### 🔑 מושגים באנגלית שחייבים לדעת

| מושג באנגלית | משמעות בעברית | דוגמה |
|---|---|---|
| **dictionary** (dict) | מילון | \`{}\` |
| **key** | מפתח — מזהה ייחודי | \`"name"\` |
| **value** | ערך — המידע ששמור | \`"M4"\` |
| **key-value pair** | זוג מפתח-ערך | \`"name": "M4"\` |
| **lookup** | חיפוש ערך לפי מפתח | \`d["name"]\` |

### 📝 סינטקס בסיסי

#### יצירת מילון
\`\`\`python
# מילון ריק
weapon = {}

# מילון עם נתונים
weapon = {
    "type": "rifle",
    "model": "M4",
    "ammo_type": "5.56mm",
    "condition": "new"
}
\`\`\`
> 💡 שים לב: המפתחות הם **מחרוזות** (strings) בתוך גרשיים

#### גישה לערך (Lookup)
\`\`\`python
weapon = {"type": "rifle", "model": "M4", "condition": "new"}

# גישה ישירה — אם המפתח לא קיים, קורסת שגיאה!
print(weapon["model"])     # M4

# גישה בטוחה — אם המפתח לא קיים, מחזיר None (או ברירת מחדל)
print(weapon.get("model"))         # M4
print(weapon.get("color", "N/A"))  # N/A
\`\`\`
> ⚠️ \`d["key"]\` = מסוכן (KeyError אם לא קיים)  
> ✅ \`d.get("key")\` = בטוח (מחזיר None)

#### הוספה ועדכון
\`\`\`python
weapon = {"type": "rifle", "model": "M4"}

# הוספת מפתח חדש
weapon["condition"] = "new"

# עדכון ערך קיים
weapon["condition"] = "damaged"

print(weapon)
# {"type": "rifle", "model": "M4", "condition": "damaged"}
\`\`\`
> 💡 אותה פקודה — אם המפתח קיים זה **עדכון**, אם לא קיים זה **הוספה**

#### מחיקה
\`\`\`python
weapon = {"type": "rifle", "model": "M4", "condition": "new"}

# מחיקה עם del
del weapon["condition"]

# מחיקה עם pop (מחזיר את הערך שנמחק)
model = weapon.pop("model")
print(model)    # "M4"
print(weapon)   # {"type": "rifle"}
\`\`\`

#### בדיקה אם מפתח קיים
\`\`\`python
weapon = {"type": "rifle", "model": "M4"}

# בדיקה עם in
if "model" in weapon:
    print("יש מודל!")

# ⚠️ in בודק רק מפתחות, לא ערכים!
print("rifle" in weapon)   # False!  (כי "rifle" הוא ערך, לא מפתח)
print("type" in weapon)    # True    (כי "type" הוא מפתח)
\`\`\`

#### מעבר על מילון (Iteration)
\`\`\`python
weapon = {"type": "rifle", "model": "M4", "condition": "new"}

# מעבר על מפתחות בלבד
for key in weapon:
    print(key)                  # type, model, condition

# מעבר על ערכים בלבד
for value in weapon.values():
    print(value)                # rifle, M4, new

# מעבר על זוגות מפתח-ערך (הכי שימושי!)
for key, value in weapon.items():
    print(f"{key}: {value}")    # type: rifle, model: M4, ...
\`\`\`
> 💡 \`items()\` = הפקודה הכי חשובה לעבודה עם מילונים בלולאה

## 📋 חלק 2 — רשימות (Lists)

### מה זה רשימה?
רשימה (list) זה כמו "מערך" — אוסף מסודר של פריטים. במבחן, כל **רשימת הנשקים במחסן** היא list של dictionaries.

#### יצירה וגישה
\`\`\`python
# רשימה של מספרים
numbers = [1, 2, 3, 4, 5]

# רשימה של מילונים (!) — ככה נראים הנתונים במבחן!
weapons = [
    {"id": 1, "type": "rifle", "model": "M4"},
    {"id": 2, "type": "machine_gun", "model": "MAG"},
    {"id": 3, "type": "rifle", "model": "Tavor"}
]

# גישה לפריט לפי אינדקס (מתחיל מ-0!)
print(weapons[0])           # {"id": 1, "type": "rifle", ...}
print(weapons[0]["model"])  # "M4"
\`\`\`

#### הוספה ומחיקה
\`\`\`python
weapons = [{"id": 1, "type": "rifle"}]

# הוספה לסוף הרשימה
weapons.append({"id": 2, "type": "launcher"})

# מחיקת פריט ספציפי
weapons.remove({"id": 1, "type": "rifle"})

# אורך הרשימה
print(len(weapons))  # 1
\`\`\`

#### סינון רשימה (List Comprehension) ⭐
\`\`\`python
weapons = [
    {"id": 1, "type": "rifle", "condition": "new"},
    {"id": 2, "type": "rifle", "condition": "damaged"},
    {"id": 3, "type": "launcher", "condition": "new"}
]

# סינון — רק נשקים במצב "new"
new_weapons = [w for w in weapons if w["condition"] == "new"]

# סינון — רק רובים (rifles)
rifles = [w for w in weapons if w["type"] == "rifle"]
\`\`\`
> ⭐ **זה קריטי למבחן!** הרבה מה-endpoints דורשים סינון

## 🔧 חלק 3 — פונקציות (Functions)

### למה צריך פונקציות?
פונקציה (function) זה בלוק קוד שאפשר לקרוא לו שוב ושוב. ב-FastAPI, **כל endpoint הוא פונקציה!**

#### הגדרת פונקציה
\`\`\`python
# פונקציה בסיסית
def greet():
    print("שלום!")

greet()  # קורא לפונקציה → מדפיס "שלום!"

# פונקציה עם פרמטר (parameter)
def greet(name):
    print(f"שלום {name}!")

greet("נתן")  # "שלום נתן!"
\`\`\`

#### החזרת ערך (return)
\`\`\`python
# פונקציה שמחזירה ערך
def add(a, b):
    return a + b

result = add(3, 5)
print(result)  # 8

# ⚠️ בלי return, הפונקציה מחזירה None
def add_broken(a, b):
    a + b  # שכחנו return!

result = add_broken(3, 5)
print(result)  # None!
\`\`\`
> ⭐ ב-FastAPI, מה שהפונקציה מחזירה (return) — זה מה שהלקוח מקבל!
