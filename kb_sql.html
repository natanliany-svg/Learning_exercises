# 🐬 מדריך לימוד: SQL ומסדי נתונים בפייתון

חיבור קוד הפייתון למסד הנתונים באמצעות הספרייה `mysql-connector-python` ושימוש בשפת שאילתות מובנית (SQL).

---

## 1. הגדרות (Core Concepts)

* **מפתח ראשי (Primary Key):** עמודה המזהה כל רשומה בטבלה באופן חד-ערכי (כמו `id` או תעודת זהות).
* **סמן (Cursor):** אובייקט ב-Python המשמש לביצוע פקודות SQL מול המסד ולמעבר על התוצאות שחזרו, שורה אחר שורה.
* **ביצוע (Execute):** הפקודה שאשכרה "לוחצת Enter" ושולחת את ה-SQL למסד.

### סוגי פקודות SQL
1. **DDL (Data Definition Language):** פקודות המגדירות את מבנה המסד והטבלאות (`CREATE`, `ALTER`, `DROP`).
2. **DML (Data Manipulation Language):** פקודות לשינוי הנתונים בתוך הטבלאות (`INSERT`, `UPDATE`, `DELETE`).
3. **DQL (Data Query Language):** פקודות לשליפת נתונים קיימים (`SELECT`).

---

## 2. שפת DDL - יצירה והגדרת טבלאות

בעזרת DDL אנו קובעים את "השלד" של הנתונים שלנו. 

```sql
-- יצירת טבלה חדשה
CREATE TABLE users (
    id INT AUTO_INCREMENT PRIMARY KEY,
    username VARCHAR(50) NOT NULL,
    email VARCHAR(100) UNIQUE,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
);

-- הוספת עמודה לטבלה קיימת
ALTER TABLE users ADD age INT;

-- מחיקת טבלה לגמרי
DROP TABLE users;
```

---

## 3. שפת DQL ופונקציות צבירה (Aggregate Functions)

כשאנחנו רוצים לחפש, לסנן ולחשב נתונים באופן מתקדם, נשתמש ב-DQL יחד עם פונקציות צבירה.

### שליפה רגילה וסינון
```sql
SELECT username, email FROM users WHERE age >= 18 ORDER BY created_at DESC;
```

### פונקציות חישוב (Aggregate)
פונקציות שמבצעות חישוב על קבוצת שורות ומחזירות ערך יחיד:
* `COUNT()`: ספירת מספר השורות.
* `SUM()`: סכום של עמודה מספרית.
* `AVG()`: ממוצע.
* `MAX() / MIN()`: הערך המקסימלי/המינימלי.

**דוגמה לשימוש מתקדם (GROUP BY):**
```sql
-- כמה מוצרים נמכרו בכל קטגוריה?
SELECT category, COUNT(id) as total_products, AVG(price) as average_price
FROM items
GROUP BY category
HAVING total_products > 5;
```

---

## 4. חיבור לפייתון - דוגמאות תחביר

### הוספת נתונים - INSERT & Commit
```python
# הנחה: כבר יש לנו אובייקט connection שעשינו ב-db.py
cursor = connection.cursor()

# השאילתה - אנחנו שמים סימני %s איפה שהערכים צריכים להיכנס
query = "INSERT INTO items (name, price) VALUES (%s, %s)"

# הערכים עצמם בתוך מופע (Tuple)
values = ("Laptop", 1200.50)

# הרצת השאילתה
cursor.execute(query, values)

# חובה! בלי commit הנתונים לא באמת יישמרו במסד הנתונים!
connection.commit()
```

### שליפת נתונים - SELECT כמילון
```python
# dictionary=True הוא קסם: מחזיר מילון במקום רשימת ערכים!
cursor = connection.cursor(dictionary=True) 

query = "SELECT * FROM items WHERE price > %s"
values = (1000,) # פסיק בסוף חובה כדי שייחשב כ-Tuple גם לאיבר אחד!

cursor.execute(query, values)
results = cursor.fetchall() # משיכת הכל

for row in results:
    print(row['name'], row['price'])
```

---

## 5. כללי זהב (Best Practices)

> [!IMPORTANT]
> **לעולם אל תשרשר מחרוזות! (SQL Injection)**  
> אל תעשה: `query = f"SELECT * FROM items WHERE name = '{name}'"`  
> זה מאפשר להאקרים לפרוץ לאתר שלך ולמחוק לך את המסד הנתונים בעזרת קוד זדוני.  
> **הדרך הנכונה:** תמיד השתמש בסימני `%s` כדי שספריית ה-Connector תגן עליך אוטומטית.

1. **Commit:** רק בשאילתות שמשנות נתונים (INSERT, UPDATE, DELETE) חייבים לבצע `connection.commit()`. ב-SELECT לא צריך.
2. **סגירת דלתות:** תמיד סגור את ה-cursor וה-connection בסיום הפעולה בבלוק `finally`. משאבי השרת מוגבלים.
3. **Repository Pattern:** אל תכתוב SQL בתוך הראוטר בשרת. כתוב מחלקה (למשל `ItemRepository`) ותכניס לשם את פונקציות ה-SQL.
