# 📘 מדריך לימוד: FastAPI ושרתים

מדריך זה מסכם את עקרונות הליבה של פיתוח שרתים מבוססי REST API באמצעות ספריית FastAPI ב-Python.

## 1. הגדרות של מושגי ליבה (Core Concepts)

* **Router (ראוטר / נתב):** רכיב האחראי על ניתוב הבקשות הנכנסות לשרת אל הפונקציות המתאימות. מומלץ להשתמש ב-\`APIRouter\` כדי לחלק את האפליקציה למספר קבצים (למשל \`users_router.py\`).
* **Path Parameters (פרמטרי נתיב):** משתנים המהווים חלק בלתי נפרד מכתובת ה-URL ומשמשים **לזיהוי משאב ספציפי**. חובה לספק אותם. 
  * *דוגמה:* ב-\`/users/5\` (הנתיב מוגדר כ-\`/users/{user_id}\`), המספר 5 מזהה את המשתמש.
* **Query Parameters (פרמטרי שאילתה):** משתנים שמתווספים בסוף ה-URL (אחרי סימן \`?\` ומופרדים ב-\`&\`) ומשמשים לרוב **לסינון, חיפוש או עיצוב** הנתונים המוחזרים. בד"כ אינם חובה.
  * *דוגמה:* \`/users?role=admin&age=20\`. ב-FastAPI, כל פרמטר בפונקציה שלא מוגדר בנתיב ה-URL, נחשב אוטומטית ל-Query Parameter.
* **Request Body (גוף הבקשה):** הנתונים (לרוב כ-JSON) שנשלחים על ידי הלקוח לשרת, בדרך כלל בבקשות מסוג POST (יצירה) או PUT (עדכון).
* **Response Model (מודל תגובה):** נעשה שימוש בספריית Pydantic (\`BaseModel\`) כדי לאכוף ולידציה של הנתונים שהלקוח שולח או מקבל.

---

## 2. דוגמאות תחביר לפעולות בסיסיות

\`\`\`python
from fastapi import FastAPI, HTTPException
from pydantic import BaseModel

app = FastAPI()

# 1. הגדרת Request Body בעזרת Pydantic
class User(BaseModel):
    name: str
    role: str = "guest"
    age: int

# 2. פעולת GET עם Path Parameter ו-Query Parameter
@app.get("/users/{user_id}")
def get_user(user_id: int, include_details: bool = False):
    if user_id == 999:
        raise HTTPException(status_code=404, detail="User not found")
    return {"user_id": user_id, "include_details": include_details}

# 3. פעולת POST ליצירת משאב עם גוף הבקשה
@app.post("/users", status_code=201)
def create_user(user: User):
    return {"message": "User created", "user": user}
\`\`\`

---

## 3. כללי זהב (Best Practices)

1. **קודי סטטוס (Status Codes):** 
   * \`200 OK\` להצלחה.
   * \`201 Created\` ליצירת משאב (POST).
   * \`404 Not Found\` כשמשאב לא קיים.
   * \`400 Bad Request\` על שגיאת לקוח.
2. **ולידציה:** עבודה תמיד מול מחלקות \`Pydantic\` ולא מול מילונים גולמיים בעת קבלת נתונים מבחוץ.
3. **Swagger UI:** FastAPI יוצר תיעוד אוטומטי בכתובת \`/docs\`. השתמש בו כדי לבדוק שאתה מחזיר ומקבל את מה שציפית!
4. **תיעוד שגיאות:** רשום לוגים (\`logger.error\`) על כל שגיאת מערכת ו-(404) כדי שיהיה לך מעקב כשהאתר רץ בייצור.

---

## 4. אינטגרציה: מודל השכבות

כדי לא ליצור קוד מבולגן, מחלקים את ה-API ל-3 שכבות (The Clean Architecture):
1. **שכבת Routers:** מקבלת בקשה, מוודאת את תקינותה, מעבירה הלאה לשירות (Service) ומחזירה תשובה מסודרת ללקוח. לא מכילה לוגיקה מסובכת!
2. **שכבת Services:** הלוגיקה וה"מוח". חישובים, אלגוריתמים והכנת הנתונים לשמירה.
3. **שכבת Repositories/DB:** מדברת ישירות עם מסד הנתונים בעזרת SQL.

**זרימת מידע אופיינית:**
Client ➡️ Router ➡️ Service ➡️ Repository ➡️ DB
