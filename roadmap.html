# 🗺️ מפת דרכים: איך לגשת לכל פרויקט API מאפס

המדריך שלפניך לא ילמד אותך איך לכתוב אפליקציית ספריה או גן חיות. הוא ילמד אותך **שיטה**. 
אנו בונים פרויקט במודל של "שכבות" (Layers), מלמטה (מסד הנתונים) ועד למעלה (השרת עצמו). 
עבור כל שכבה ננתח את העבודה לפי **מודל ה-6 שלבים**: מהות, ביצוע, מיקום בקבצים, ייבואים (Imports), קוד מפורט, ובדיקה.

---

## שכבה 1: תשתיות וסביבת עבודה (Infrastructure)

> **1. מהות והגדרת השכבה**
> לפני שכותבים שורת קוד אחת, חייבים להכין את ה"קרקע". סביבה וירטואלית מוודאת שהספריות שנתקין לא יתנגשו עם פרויקטים אחרים, ותשתיות כמו Docker יספקו לנו מסד נתונים נקי מבלי להתקין שרת MySQL כבד על המחשב הפיזי שלנו.

> **2. פעולות נדרשות בפועל (בסביבת לינוקס / WSL)**
> * פתיחת טרמינל ויצירת תיקייה: `mkdir my_project` ואז `cd my_project`
> * יצירת סביבה וירטואלית: `python3 -m venv venv`
> * הפעלת הסביבה: `source venv/bin/activate`
> *(הערה: אם היית עובד ב-Windows ישן, הפקודות היו `md` ויצירת הסביבה ע"י `python -m venv` והפעלה ע"י `.\venv\Scripts\activate`)*
> * התקנת הספריות הבסיסיות: `pip install fastapi uvicorn mysql-connector-python pydantic`
> * הפעלת קונטיינר Docker עם MySQL:
> ```bash
> docker run -d --name my-mysql -e MYSQL_ROOT_PASSWORD=1234 -e MYSQL_DATABASE=my_db -p 3306:3306 mysql:8
> ```

> **3. היכן ייכתב הקוד ולמה?**
> שלב זה אינו מצריך קובץ קוד פייתון. כל הפעולות מבוצעות בטרמינל (Terminal / CMD) בתיקיית השורש של הפרויקט. התיקייה תכלול כעת רק תיקייה פנימית בשם `venv`.

---

## שכבה 2: חיבור למסד הנתונים (Database Setup)

> **1. מהות והגדרת השכבה**
> היכולת שלנו לדבר עם ה-MySQL. בשכבה זו ניצור צינור תקשורת מרכזי (Connection) שכל האפליקציה תשתמש בו כדי שלא נצטרך לכתוב מחדש את הסיסמה ל-DB בכל פעם.

> **2. פעולות נדרשות בפועל**
> יצירת קובץ התחברות חכם שיחזיר לנו חיבור מוכן בכל פעם שנקרא לו. הגדרת משתני החיבור: HOST (מיקום השרת), USER (שם משתמש), PASSWORD (סיסמה), ו-DATABASE (שם המסד שבו נעבוד).

> **3. היכן ייכתב הקוד ולמה?**
> בקובץ בודד בתיקייה הראשית בשם `database.py`. הסיבה: זהו קובץ הגדרות תשתית (Config) ואין סיבה להחביא אותו.

> **4. הסבר מפורט על ה-Imports**
> ```python
> import mysql.connector
> ```
> ייבוא הספרייה שהתקנו קודם. היא "המתורגמנית" שיודעת לקחת פקודות מפייתון ולתרגם אותן לשפה ששרת ה-MySQL מבין מבעד לחיבור הרשת.

> **5. הסבר על הקוד שורה-אחר-שורה**
> ```python
> # יצירת פונקציה שכאשר קוראים לה, תחזיר צינור תקשורת פתוח
> def get_connection():
>     # קריאה לפונקציית החיבור מתוך הספרייה
>     return mysql.connector.connect(
>         host="localhost",   # השרת רץ על המחשב שלנו (בתוך דוקר)
>         user="root",        # משתמש ברירת המחדל החזק ביותר
>         password="1234",    # הסיסמה שהגדרנו למעלה בפקודת ה-Docker
>         database="my_db"    # שם מסד הנתונים הספציפי שאליו אנו פונים
>     )
> ```

> **6. בדיקה ותיקוף (Verification)**
> איך נדע שזה עובד לפני שנמשיך? נוסיף בתחתית הקובץ טסט קטן:
> ```python
> if __name__ == "__main__":
>     conn = get_connection()
>     print("Database connected successfully!")
>     conn.close()
> ```
> נריץ בטרמינל `python database.py` ונוודא שאין שגיאות.

---

## שכבה 3: גישה לנתונים - ה-Repository / DAL (OOP)

> **1. מהות והגדרת השכבה**
> שכבת ה-Data Access Layer (DAL) היא השכבה היחידה בפרויקט שמורשית לכתוב משפטי SQL! היא מסתירה את המסד משאר האפליקציה. המהות שלה היא ביצוע פעולות **CRUD**:
> * **C**reate (INSERT) - הוספת נתון חדש.
> * **R**ead (SELECT) - שליפת נתונים.
> * **U**pdate (UPDATE) - עדכון נתון קיים.
> * **D**elete (DELETE) - מחיקה.
> אנו נשתמש בתכנות מונחה עצמים (OOP) וניצור "מחלקה" שתאגד את כל הפעולות האלו.

> **2. פעולות נדרשות בפועל**
> יצירת מחלקה עם פונקציות שאחראיות לקבל חיבור מהשכבה הקודמת (database.py), לפתוח Cursor, להריץ שאילתה, ולעשות Commit במידת הצורך.

> **3. היכן ייכתב הקוד ולמה?**
> נייצר תיקייה בשם `dal` ובתוכה קובץ בשם `my_repository.py`. ההפרדה לתיקייה נועדה לסדר – ייתכן שבעתיד יהיו לנו מספר קבצי Repository (למשתמשים, לפריטים, וכו').

> **4. הסבר מפורט על ה-Imports**
> ```python
> from database import get_connection
> ```
> אנו מייבאים את פונקציית החיבור שיצרנו בשכבה 2, כדי שהמחלקה שלנו תוכל לפתוח ערוץ למסד הנתונים כשהיא צריכה.

> **5. הסבר על הקוד שורה-אחר-שורה**
> ```python
> class GenericRepository:
>     
>     # פונקציה מסוג Create
>     def create_item(self, item_name):
>         # 1. קריאה לשכבה 2 כדי להביא חיבור
>         connection = get_connection()
>         # 2. פתיחת 'סמן' שמבצע פקודות בפועל
>         cursor = connection.cursor()
>         
>         # 3. הכנת השאילתה - שימו לב ל-%s שמונע SQL Injection
>         query = "INSERT INTO items (name) VALUES (%s)"
>         
>         # 4. ביצוע השאילתה - מעבירים כ-Tuple את הערך
>         cursor.execute(query, (item_name,))
>         
>         # 5. שמירת הפעולה במסד (חובה ב-INSERT/UPDATE/DELETE)
>         connection.commit()
>         
>         # 6. סגירת הדלתות (שחרור משאבים)
>         cursor.close()
>         connection.close()
> ```

---

## שכבה 4: השרת והראוטרים (FastAPI)

> **1. מהות והגדרת השכבה**
> הגענו ל"פקיד הקבלה". כאן יושב השרת שמאזין לבקשות מהאינטרנט (כמו דפדפנים או ניידים). תפקידו לנתב את הבקשות, לוודא שהלקוח שלח נתונים נכונים (Validation), ולקרוא לשכבה 3 (DAL) כדי לבצע את הפעולה במאגר.

> **2. פעולות נדרשות בפועל**
> הפעלת אפליקציית FastAPI, יצירת אובייקט של ה-Repository, והגדרת פונקציות עם "עיטורים" (Decorators) שקובעים את הכתובת (למשל `@app.post("/items")`).

> **3. היכן ייכתב הקוד ולמה?**
> בקובץ הראשי של הפרויקט שייקרא `main.py`. מפה הכל מתחיל.

> **4. הסבר מפורט על ה-Imports**
> ```python
> from fastapi import FastAPI
> from pydantic import BaseModel
> from dal.my_repository import GenericRepository
> ```
> ייבוא `FastAPI` כדי לבנות את השרת, `BaseModel` מ-pydantic כדי להגדיר מודלים שיוודאו את הנתונים הנכנסים, ואת ה-`GenericRepository` משכבה 3 כדי שנוכל לדבר עם ה-DB.

> **5. הסבר על הקוד שורה-אחר-שורה**
> ```python
> # הקמת תשתית השרת
> app = FastAPI()
> 
> # יצירת מופע (Object) מהמחלקה שבנינו בשכבה 3
> repo = GenericRepository()
> 
> # הגדרת "מודל אימות" - הלקוח יחויב לשלוח משתנה בשם 'name' מסוג מחרוזת
> class ItemRequest(BaseModel):
>     name: str
> 
> # הגדרת נתיב מסוג POST לכתובת השורש /items
> @app.post("/items")
> def create_new_item(request_body: ItemRequest):
>     # קריאה ל-DAL לביצוע השמירה. אנו מוסרים לו את השם מהבקשה
>     repo.create_item(request_body.name)
>     
>     # החזרת הודעת הצלחה ללקוח כ-JSON
>     return {"message": "Item was created successfully"}
> ```

> **6. בדיקה ותיקוף**
> בחלון הטרמינל מריצים את שרת הפיתוח: `uvicorn main:app --reload`, ונכנסים בדפדפן ל-`http://127.0.0.1:8000/docs`. משתמשים בממשק כדי לשלוח בקשה ורואים אם היא מצליחה.

---

## שכבה 5: תיעוד ולוגים (Logging)

> **1. מהות והגדרת השכבה**
> ללא לוגים אנחנו עיוורים. כל בקשה שמגיעה לשרת וכל שגיאה פוטנציאלית חייבות להירשם. זוהי שכבת המעטפת (Wrapper).

> **3. היכן ולמה?**
> הלוגים בדרך כלל משולבים ישירות בתוך הראוטרים ב-`main.py` ובתוך הלוגיקה ב-`dal`, כדי לשקף את הזרימה בזמן אמת.

> **5. הסבר שילוב בקוד**
> ```python
> import logging
> # הגדרת פורמט הלוגר לכל הפרויקט (בראש ה-main.py)
> logging.basicConfig(level=logging.INFO, format='%(levelname)s - %(message)s')
> 
> @app.post("/items")
> def create_new_item(request_body: ItemRequest):
>     logging.info(f"Received request to create item: {request_body.name}")
>     try:
>         repo.create_item(request_body.name)
>         logging.info("Item created successfully in DB")
>         return {"message": "Success"}
>     except Exception as e:
>         # פקודה זו תדפיס ללוג את כל מסלול השגיאה שהקריסה את השרת
>         logging.exception("Failed to create item")
>         return {"error": "Internal server error"}
> ```
