# 🗺️ מפת דרכים: איך לגשת לכל פרויקט API מאפס

המדריך שלפניך לא ילמד אותך איך לכתוב אפליקציית ספריה או גן חיות. הוא ילמד אותך **שיטה**. 
אנו בונים פרויקט במודל של "שכבות" (Layers), מלמטה (מסד הנתונים) ועד למעלה (השרת עצמו). 
עבור כל שכבה ננתח את העבודה לפי **מודל ה-6 שלבים**: מהות, ביצוע, מיקום בקבצים, ייבואים (Imports), קוד מפורט, ובדיקה.

---

## שכבה 1: תשתיות וסביבת עבודה (Infrastructure)

> **1. מהות והגדרת השכבה**
> לפני שכותבים שורת קוד אחת, חייבים להכין את ה"קרקע". סביבה וירטואלית מוודאת שהספריות שנתקין לא יתנגשו עם פרויקטים אחרים, ותשתיות כמו Docker יספקו לנו מסד נתונים נקי מבלי להתקין שרת MySQL כבד על המחשב הפיזי שלנו.

> **2. פעולות נדרשות בפועל (בסביבת לינוקס / WSL)**
> * פתיחת טרמינל ויצירת תיקייה: `mkdir my_project` ואז `cd my_project`
> * יצירת סביבה וירטואלית: `python3 -m venv venv`
> * הפעלת הסביבה: `source venv/bin/activate`
> *(הערה: אם היית עובד ב-Windows ישן, הפקודות היו `md` ויצירת הסביבה ע"י `python -m venv` והפעלה ע"י `.\venv\Scripts\activate`)*
> * התקנת הספריות הבסיסיות: `pip install fastapi uvicorn mysql-connector-python pydantic`
> * הפעלת קונטיינר Docker עם MySQL:
> ```bash
> docker run -d --name my-mysql -e MYSQL_ROOT_PASSWORD=1234 -e MYSQL_DATABASE=my_db -p 3306:3306 mysql:8
> ```

> **3. היכן ייכתב הקוד ולמה?**
> שלב זה אינו מצריך קובץ קוד פייתון. כל הפעולות מבוצעות בטרמינל (Terminal / CMD) בתיקיית השורש של הפרויקט. התיקייה תכלול כעת רק תיקייה פנימית בשם `venv`.

---

## שכבה 2: חיבור למסד הנתונים (Database Setup)

> **1. מהות והגדרת השכבה**
> היכולת שלנו לדבר עם ה-MySQL. בשכבה זו ניצור צינור תקשורת מרכזי (Connection) שכל האפליקציה תשתמש בו כדי שלא נצטרך לכתוב מחדש את הסיסמה ל-DB בכל פעם.

> **2. פעולות נדרשות בפועל**
> יצירת קובץ התחברות חכם שיחזיר לנו חיבור מוכן בכל פעם שנקרא לו. הגדרת משתני החיבור: HOST (מיקום השרת), USER (שם משתמש), PASSWORD (סיסמה), ו-DATABASE (שם המסד שבו נעבוד).

> **3. היכן ייכתב הקוד ולמה?**
> בקובץ בודד בתיקייה הראשית בשם `database.py`. הסיבה: זהו קובץ הגדרות תשתית (Config) ואין סיבה להחביא אותו.

> **4. הסבר מפורט על ה-Imports**
> ```python
> import mysql.connector
> ```
> ייבוא הספרייה שהתקנו קודם. היא "המתורגמנית" שיודעת לקחת פקודות מפייתון ולתרגם אותן לשפה ששרת ה-MySQL מבין מבעד לחיבור הרשת.

> **5. הסבר על הקוד שורה-אחר-שורה**
> ```python
> # יצירת פונקציה שכאשר קוראים לה, תחזיר צינור תקשורת פתוח
> def get_connection():
>     # קריאה לפונקציית החיבור מתוך הספרייה
>     return mysql.connector.connect(
>         host="localhost",   # השרת רץ על המחשב שלנו (בתוך דוקר)
>         user="root",        # משתמש ברירת המחדל החזק ביותר
>         password="1234",    # הסיסמה שהגדרנו למעלה בפקודת ה-Docker
>         database="my_db"    # שם מסד הנתונים הספציפי שאליו אנו פונים
>     )
> ```

> **6. בדיקה ותיקוף (Verification)**
> איך נדע שזה עובד לפני שנמשיך? נוסיף בתחתית הקובץ טסט קטן:
> ```python
> if __name__ == "__main__":
>     conn = get_connection()
>     print("Database connected successfully!")
>     conn.close()
> ```
> נריץ בטרמינל `python database.py` ונוודא שאין שגיאות.

---

## שכבה 3: גישה לנתונים - ה-Repository (DAL)

> **1. מהות והגדרת השכבה**
> שכבת ה-Data Access Layer (DAL) היא השכבה היחידה בפרויקט שמורשית לכתוב משפטי SQL! היא מסתירה את המסד משאר האפליקציה. 
> תפקידה לעשות פעולות מול המסד (CRUD) **ללא שום לוגיקה עסקית**.

> **2. היכן ייכתב הקוד ולמה?**
> נייצר תיקייה בשם `repositories` ובתוכה קובץ בשם `item_repository.py`. זה שומר על סדר כשיש לנו מספר טבלאות.

> **3. הסבר על הקוד שורה-אחר-שורה**
> ```python
> from db import get_connection
> 
> class ItemRepository:
>     def create_item(self, item_name, price):
>         connection = get_connection()
>         cursor = connection.cursor()
>         query = "INSERT INTO items (name, price) VALUES (%s, %s)"
>         cursor.execute(query, (item_name, price))
>         connection.commit()
>         cursor.close()
>         connection.close()
> ```

---

## שכבה 4: לוגיקה עסקית - ה-Service

> **1. מהות והגדרת השכבה**
> זוהי ה"מוח" של המערכת. שכבת ה-Service מקבלת בקשות מהראוטר, מפעילה עליהן חוקים עסקיים (למשל: "האם המחיר שלילי?"), ואם הכל תקין - היא קוראת לשכבת ה-Repository כדי לשמור או לשלוף נתונים. 

> **2. היכן ייכתב הקוד ולמה?**
> בתוך תיקייה בשם `services` בקובץ `item_service.py`.

> **3. הסבר מפורט על ה-Imports**
> ```python
> from repositories.item_repository import ItemRepository
> ```
> הסרוויס חייב להכיר את הריפוזיטורי כדי לבקש ממנו לשמור נתונים.

> **4. הסבר על הקוד**
> ```python
> class ItemService:
>     def __init__(self):
>         # הזרקת תלויות: הסרוויס מחזיק עותק של הריפוזיטורי
>         self.repo = ItemRepository()
> 
>     def add_new_item(self, name, price):
>         # לוגיקה עסקית: בדיקה שהמחיר תקין
>         if price < 0:
>             raise ValueError("Price cannot be negative!")
>         
>         # אם תקין, קורא לשכבה 3 (המסד)
>         self.repo.create_item(name, price)
> ```

---

## שכבה 5: השרת והראוטרים (FastAPI)

> **1. מהות והגדרת השכבה**
> פקיד הקבלה. הראוטר מאזין לבקשות HTTP. תפקידו לעשות ולידציה בסיסית דרך מודלים של Pydantic, ולקרוא ל-Service בלבד! (הוא לעולם לא פונה ישירות למסד הנתונים).

> **2. היכן ייכתב הקוד ולמה?**
> מודלים ייכתבו בתיקיית `models/item_model.py`.
> הראוטרים ייכתבו בתיקיית `routers/item_router.py`.
> קובץ ה-`main.py` הראשי רק "ייבא" (include) את הראוטרים ויפעיל את השרת.

> **3. הסבר על הקוד בראוטר**
> ```python
> from fastapi import APIRouter, HTTPException
> from models.item_model import ItemRequest
> from services.item_service import ItemService
> 
> router = APIRouter()
> service = ItemService()
> 
> @router.post("/items")
> def create_new_item(request_body: ItemRequest):
>     try:
>         # הראוטר מעביר את הבקשה לסרוויס שיטפל בלוגיקה
>         service.add_new_item(request_body.name, request_body.price)
>         return {"message": "Item created successfully"}
>     except ValueError as e:
>         # אם הסרוויס זרק שגיאת ולידציה (מחיר שלילי)
>         raise HTTPException(status_code=400, detail=str(e))
> ```

---

## שכבה 6: תיעוד ולוגים (Logging)

> **1. מהות והגדרת השכבה**
> חובה במערכות שרת לתעד כל פעולה. ניצור קובץ ייעודי בתיקיית `utils` שיגדיר לוגר אחיד לכל הפרויקט.

> **2. היכן ולמה?**
> ניצור את `utils/logger.py` שבו תהיה ההגדרה, ונשתמש בו בכל השכבות (בסרוויס ובראוטר).

> **3. הסבר שילוב בקוד**
> ```python
> # utils/logger.py
> import logging
> logging.basicConfig(level=logging.INFO, format='[%(levelname)s] %(message)s')
> logger = logging.getLogger(__name__)
> 
> # שימוש מתוך ה-Service
> from utils.logger import logger
> logger.info(f"Created item with name={name}")
> logger.error(f"Failed to create item, negative price")
> ```
