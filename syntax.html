# 🛠️ מחסן הסינטאקס (והכוונה למבחנים)

ריכזנו עבורך את הפקודות השכיחות ביותר שחוזרות על עצמן בכל פרויקט. המטרה היא לשנן את רוטינת ההקמה כ"טייס אוטומטי", וכך לפנות את הראש ללוגיקה המורכבת יותר של האפליקציה.
כמו כן, תמצא כאן הכוונה מדויקת איך "לדוג" סינטאקס מתוך האתרים המותרים במבחן.

---

## 1. רוטינת הקמת פרויקט מאפס (WSL / Linux)
**את הפקודות האלו יש לשנן בעל פה. הן מבוצעות בטרמינל כדי להרים סביבת עבודה תוך פחות מ-2 דקות:**

```bash
# 1. יצירת תיקיית הפרויקט וכניסה אליה
mkdir my_project
cd my_project

# 2. הקמת סביבה וירטואלית מבודדת לפייתון
python3 -m venv venv

# 3. הפעלת הסביבה הווירטואלית (שים לב לשינוי בין ווינדוס ל-WSL)
source venv/bin/activate

# 4. התקנת חבילות הבסיס
pip install fastapi uvicorn mysql-connector-python pydantic

# 5. שמירת רשימת החבילות המותקנות לקובץ, כדי שנוכל להעביר לשרת בעתיד
pip freeze > requirements.txt
```

---

## 2. שרת FastAPI בסיסי (Boilerplate)
**זהו הקוד המינימלי שנדרש כדי ששרת יעבוד. בדרך כלל הוא נכתב בקובץ `main.py`:**

```python
from fastapi import FastAPI
import uvicorn

app = FastAPI()

@app.get("/")
def read_root():
    return {"message": "Hello, Server is running!"}

# הרצה אוטומטית מקובץ הפייתון עצמו
if __name__ == "__main__":
    uvicorn.run("main:app", host="127.0.0.1", port=8000, reload=True)
```

---

## 3. הכוונה וטיפים למבחן (Open Book) 🌐

במבחנים רבים מותר השימוש באתרים רשמיים כגון **W3Schools** ו-**docs.python.org**. במקום לשנן סינטאקס של SQL או ספריות מורכבות, חשוב לדעת **איך לחפש מהר**.

<div class="tip-box">
    <strong>💡 איך מוצאים פקודות SQL או התחברות ל-MySQL במבחן?</strong><br>
    היכנס ל- <code>w3schools.com</code>. בתפריט העליון בחר ב- <strong>Tutorials</strong> ואז <strong>Learn MySQL</strong> (לפקודות SQL טהורות) או <strong>Learn Python</strong> (ואז תגלול למטה ל-Python MySQL).
    <ul>
        <li><strong>חיבור למסד:</strong> חפש "MySQL Get Started" בצד שמאל - תמצא שם את הקוד המדויק ל-<code>mysql.connector.connect(...)</code>.</li>
        <li><strong>הוספת נתונים:</strong> חפש "MySQL Insert" בצד שמאל. תמצא את הסינטאקס שמסביר על שימוש ב-<code>%s</code> למניעת פריצות.</li>
        <li><strong>שליפה (SELECT):</strong> חפש "MySQL Select". שם מוסבר איך עושים <code>fetchall()</code> ורצים על התוצאות בלולאת <code>for</code>.</li>
    </ul>
</div>

<div class="tip-box">
    <strong>💡 איך מוצאים דברים מתקדמים בפייתון (מילונים, Lists, שגיאות)?</strong><br>
    היכנס ל- <code>docs.python.org/3/tutorial</code>. זהו המדריך הרשמי שמופיע בראש האתר.
    <ul>
        <li><strong>מבני נתונים (Data Structures):</strong> תחת פרק 5 (Data Structures) תמצא הסברים על מתודות של רשימות, ואיך לעבוד עם מילונים.</li>
        <li><strong>שגיאות ו-Exceptions:</strong> תחת פרק 8 (Errors and Exceptions) תוכל להעתיק את מבנה ה-<code>try...except</code> המדויק.</li>
    </ul>
</div>
